services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: allotment
      POSTGRES_PASSWORD: allotment
      POSTGRES_DB: allotment
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allotment"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      ALLOTMENT_DATABASE_URL: postgresql+psycopg://allotment:allotment@db:5432/allotment
      ALLOTMENT_ADMIN_TOKEN: ${ALLOTMENT_ADMIN_TOKEN:-change-me}
      ALLOTMENT_SECRET_KEY: ${ALLOTMENT_SECRET_KEY:-change-me-32-bytes-min!!-change-me}
      ALLOTMENT_POOL_RETENTION_DAYS: ${ALLOTMENT_POOL_RETENTION_DAYS:-30}
