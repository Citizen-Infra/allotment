name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      # Postgres 18 to match the production engine (Railway runs 18.x), so the
      # suite is exercised on the real backend, not just SQLite.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: allotment
          POSTGRES_PASSWORD: allotment
          POSTGRES_DB: allotment
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U allotment"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest, sqlite)
        run: pytest

      - name: Test (pytest, postgres)
        env:
          ALLOTMENT_DATABASE_URL: postgresql+psycopg://allotment:allotment@localhost:5432/allotment
        run: pytest
